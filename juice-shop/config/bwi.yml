# BWI Developer Conference CTF — Juice Shop Custom Configuration
# Build image with: docker build -f juice-shop/Dockerfile -t bwi-juice-shop:latest .
# Run with:         docker run -e NODE_ENV=bwi -e CTF_KEY=<key> -p 3000:3000 bwi-juice-shop:latest
#
# OPERATOR CHECKLIST before building:
#   1. Replace every occurrence of "SHOPNAME" with the actual shop name
#   2. Replace assets/logo.png with the real logo file
#   3. Set CTF_KEY in ctfd/.env (same key used for challenge export)

application:
  domain: dev.con.local
  name: 'LockHeedGünter'
  logo: 'logo.png'
  favicon: 'favicon_v2.ico'
  theme: 'bluegrey-lightgreen'
  showVersionNumber: false
  showGitHubLinks: false
  localBackupEnabled: false
  numberOfRandomFakeUsers: 30
  altcoinName: 'BundesCoins'
  privacyContactEmail: 'security@bwi.de'

challenges:
  showHints: true
  showMitigations: false
  restrictToTutorialsFirst: false
  codingChallengesEnabled: 'solved'
  safetyMode: 'enabled'
  # The Product Tampering challenge requires changing a product's URL to this value
  overwriteUrlForProductTamperingChallenge: 'https://www.bwi.de'

ctf:
  showFlagsInNotifications: true

hackingInstructor:
  isEnabled: false

products:
  # -----------------------------------------------------------------------
  # CHALLENGE-REQUIRED PRODUCTS
  # Do NOT remove the challenge-flag fields or those challenges break silently.
  # -----------------------------------------------------------------------

  # Product Tampering challenge — exactly ONE product must have this field
  - name: 'LG-44 "Eisenfaust" Kampfpanzer'
    description: >-
      Der neueste Hauptkampfpanzer von LockHeedGünter. 1.500-PS-Turbodiesel,
      140-mm-Glattrohrkanone, Reaktivpanzerung der Generation V.
      Lieferzeit: 18 Monate. <em>Derzeit im Angebot — Flottenkauf möglich!</em>
    price: 8900000.00
    deluxePrice: 7500000.00
    quantity: 12
    limitPerUser: 1
    image: 'panzer.png'
    urlForProductTamperingChallenge: 'https://www.bwi.de'
    reviews:
      - text: 'Endlich ein Panzer der auch im Stadtverkehr überzeugt. Einparkassistent fehlt noch, aber das Produktteam hat Besserung versprochen.'
        author: jim
      - text: 'Reaktivpanzerung Gen V hält was sie verspricht. Getestet unter realen Bedingungen — keine weiteren Fragen. ★★★★★'
        author: bjoern

  # Christmas Special challenge — exactly ONE product must have this flag
  - name: 'LG Adventskalender "24 Tage Feuerkraft"'
    description: >-
      Exklusiver LockHeedGünter Adventskalender für den anspruchsvollen
      Verteidigungsexperten. Hinter jedem Türchen verbirgt sich ein
      Miniatur-Waffensystemmodell. Limitierte Auflage — nur solange Vorrat reicht!
    price: 299.99
    deluxePrice: 249.99
    quantity: 50
    image: 'adventskalender.png'
    useForChristmasSpecialChallenge: true

  # Retrieve Blueprint + EXIF challenges — exactly ONE product must have both fields
  # The referenced PDF must exist in the container (Dockerfile copies it there)
  - name: 'LG-F9 "Sturmadler" Mehrzweckkampfjet'
    description: >-
      Supersonischer Mehrzweckkampfjet der 5. Generation. Stealth-Technologie,
      AESA-Radar, Reichweite 3.200 km. Bewaffnung: 2× Luft-Luft-Raketen LG-R77,
      4× Präzisionsbomben LG-GBU12. <em>Technische Daten: streng vertraulich.</em>
    price: 95000000.00
    deluxePrice: 88000000.00
    quantity: 4
    image: 'kampfjet.png'
    reviews:
      - text: 'Radar hat beim ersten Flug direkt 12 Ziele gleichzeitig erfasst. Meine Piloten sind begeistert. Einziger Kritikpunkt: Bedienungsanleitung nur auf Englisch.'
        author: ciso
      - text: 'Stealth funktioniert hervorragend — ATC hat uns dreimal aus den Augen verloren. Technische Daten leider geschwärzt, Blueprint wäre hilfreich gewesen.'
        author: jim
    fileForRetrieveBlueprintChallenge: 'bwi_nvg7_specs.pdf'
    exifForBlueprintChallenge:
      - LockHeedGünter
      - LG-F9
      - Sturmadler

  # Pastebin Data Leak challenge — requires outbound internet to pastebin.com.
  # Cannot be solved in an offline environment — exclude from CTFd scoring if needed.
  - name: 'LG-SIGINT "Lauscher" Aufklärungsdrohne'
    description: >-
      Unbemannte Aufklärungsdrohne mit SIGINT-Payload. Flugdauer: 36 Stunden,
      Reichweite: 500 km, verschlüsselter Datenlink. Einsatz: strategische
      Fernaufklärung und elektronische Kriegsführung.
    price: 4200000.00
    deluxePrice: 3800000.00
    quantity: 8
    image: 'drohne.png'
    keywordsForPastebinDataLeakChallenge:
      - 'LG-GEHEIM'
      - 'Lauscher-Zugangscode'

  # -----------------------------------------------------------------------
  # STANDARD PRODUCTS — LockHeedGünter Rüstungskatalog
  # -----------------------------------------------------------------------

  - name: 'LG-CVN "Poseidon" Flugzeugträger'
    description: >-
      Nuklear angetriebener Flugzeugträger der Poseidon-Klasse. Verdrängung:
      100.000 t, Kapazität: 90 Flugzeuge, 5.000 Mann Besatzung.
      Zwei elektromagnetische Katapultsysteme (EMALS). Auf Anfrage.
    price: 13000000000.00
    deluxePrice: 11500000000.00
    quantity: 1
    image: 'traeger.png'
    reviews:
      - text: 'Lieferung hat 3 Jahre gedauert, aber der Träger ist absolut beeindruckend. Parkplatz im Hafen musste ich selbst organisieren. 4/5 Sterne.'
        author: jim
      - text: 'Preis-Leistung top. Deluxe-Rabatt hat sich gelohnt — 1,5 Milliarden gespart. Katapult funktioniert einwandfrei, erster F9 direkt beim ersten Versuch gestartet.'
        author: bjoern

  - name: 'LG-AH7 "Wüstenskorpion" Kampfhubschrauber'
    description: >-
      Zweisitziger Angriffshubschrauber. Bewaffnung: 1× 30-mm-Kettenkanone,
      16× Panzerabwehrlenkraketen LG-HMT, 4× Luft-Luft-Raketen.
      Zielerfassungssystem mit KI-gestützter Zielerkennung.
    price: 31000000.00
    deluxePrice: 28000000.00
    quantity: 6
    image: 'hubschrauber.png'

  - name: 'LG-SUB "Tiefseejäger" U-Boot'
    description: >-
      Konventionell angetriebenes U-Boot der Tiefseejäger-Klasse. Tauchtiefe:
      400 m, Reichweite: 15.000 sm, 8× Torpedorohre Kaliber 533 mm.
      AIP-Antrieb für geräuschlose Langzeittauchfahrt.
    price: 750000000.00
    deluxePrice: 700000000.00
    quantity: 2
    image: 'uboot.png'
    reviews:
      - text: 'AIP-Antrieb ist bemerkenswert leise. 72 Stunden getaucht ohne dass jemand etwas gemerkt hat — inklusive der eigenen Besatzung. Orientierungssystem bitte noch verbessern.'
        author: ciso
      - text: 'Torpedorohre lassen sich auch unter Druck problemlos bedienen. Einziger Minuspunkt: Kantine für 50 Mann nach 3 Wochen auf See etwas eng.'
        author: jim

  - name: 'LG-MLRS "Donnerhagel" Raketenwerfer'
    description: >-
      Selbstfahrendes Mehrfachraketenwerfer-System. 12-Rohr-Lafette,
      Kaliber 227 mm, Reichweite bis 300 km mit ATACMS-kompatibler Munition.
      Vollautomatisches Lade- und Feuerkontrollsystem.
    price: 6800000.00
    deluxePrice: 6200000.00
    quantity: 9
    image: 'raketenwerfer.png'

  - name: 'LG-G33 "Splitterfürst" Handgranate (12er-Pack)'
    description: >-
      Offensiv-/Defensiv-Splitterhandgranate. Verzögerung: 4 Sekunden,
      Splitterwirkung: 20 m Radius. Gehäuse aus vorgesplittertem Stahl.
      Für den professionellen Infanteristen.
    price: 189.00
    deluxePrice: 159.00
    quantity: 500
    image: 'granate.png'
    reviews:
      - text: 'Zuverlässig, präzise, bewährte Qualität. Habe das komplette 12er-Pack in einer Übung verbraucht — Nachschub war am nächsten Tag da. Kundenservice top!'
        author: bjoern
      - text: '4 Sekunden Verzögerung sind genau richtig. Nicht zu lang, nicht zu kurz. Kommt gut verpackt an, alle Sicherungen intakt. Klare Kaufempfehlung.'
        author: ciso

  - name: 'LG-APV "Schattenluchs" Taktisches Fahrzeug'
    description: >-
      Gepanzertes Mehrzweckfahrzeug (4×4). Schutzklasse STANAG 4569 Level 3,
      V-förmiger Minenschutzrumpf, 300-PS-Dieselmotor, Nutzlast 1.200 kg.
      Optional mit Waffenstation LG-RWS30 nachrüstbar.
    price: 580000.00
    deluxePrice: 520000.00
    quantity: 20
    image: 'fahrzeug.png'
    reviews:
      - text: 'V-Rumpf hat uns bei der letzten Übung das Leben gerettet — im übertragenen Sinne natürlich. Waffenstation RWS30 als Upgrade absolut empfehlenswert.'
        author: bjoern

  - name: 'LG-SR50 "Geisterjäger" Scharfschützengewehr'
    description: >-
      Präzisionsschützengewehr Kaliber .50 BMG. Effektive Reichweite: 1.800 m,
      Lauf aus kaltgehämmertem Stahl, verstellbarer Schaft, integrierter
      Schalldämpfer optional. Genauigkeit: &lt; 0,5 MOA.
    price: 14900.00
    deluxePrice: 13500.00
    quantity: 35
    image: 'scharfschuetze.png'
    reviews:
      - text: '0,5 MOA bei 1.800 m ist keine Übertreibung — getestet. Schalldämpfer-Option unbedingt dazubestellen, macht einen großen Unterschied in der Kommunikation.'
        author: ciso
      - text: 'Bester Kauf seit Jahren. Lauf hält auch nach 5.000 Schuss noch die versprochene Genauigkeit. Support hat sofort geholfen als die Kimme locker war.'
        author: jim

  - name: 'LG-MANPADS "Himmelswächter" Schulterrakete'
    description: >-
      Schultergestütztes Fliegerabwehrsystem (MANPADS). Infrarot-Suchkopf
      der 3. Generation, Reichweite: 6 km, Gipfelhöhe: 4.500 m.
      Reaktionszeit ab Schulter: unter 5 Sekunden.
    price: 320000.00
    deluxePrice: 290000.00
    quantity: 40
    image: 'manpads.png'

  - name: 'LG-EXO "Stahlritter" Exoskelett'
    description: >-
      Taktisches Kampfexoskelett für Infanterie. Kraftverstärkung: 5×,
      integriertes HUD, 8-Stunden-Akkulaufzeit, ballistischer Schutz
      Level IV. Gewicht mit Panzerung: 32 kg. Serienreif ab Q3 2026.
    price: 220000.00
    deluxePrice: 195000.00
    quantity: 15
    image: 'exoskelett.png'
    reviews:
      - text: 'HUD-Integration ist fantastisch. Trage das Exoskelett seit 3 Wochen täglich — Rücken ist seitdem schmerzfrei. Akku hält locker 8 Stunden durch.'
        author: bjoern
      - text: 'Kraftverstärkung 5× klingt viel, fühlt sich aber natürlich an nach kurzer Eingewöhnung. Q3 2026 kann nicht früh genug kommen — will gleich 10 Stück.'
        author: ciso

memories:
  # Geo-stalking challenges require exactly two memory entries with GPS metadata.
  # IMPORTANT: The image files must have real GPS EXIF data embedded.
  # Without geotagged images these challenges cannot be solved — exclude from scoring
  # or replace with real geotagged photos and update the answers accordingly.
  - image: 'kaserne-sommer.png'
    caption: 'Sommertag auf dem Kasernengelände'
    user: 'john'
    geoStalkingMetaSecurityQuestion: 3
    geoStalkingMetaSecurityAnswer: 'Köln'
  - image: 'uebung-winter.png'
    caption: 'Winterübung – irgendwo in Brandenburg'
    user: 'emma'
    geoStalkingVisualSecurityQuestion: 10
    geoStalkingVisualSecurityAnswer: 'Frankfurt'
