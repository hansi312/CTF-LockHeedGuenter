# CTFd stack for the BWI Developer Conference CTF central server
#
# First-time TLS setup:
#   cp .env.example .env && edit .env with real secrets
#   bash certbot-init.sh          # bootstraps Let's Encrypt cert and starts everything
#
# Normal start (after TLS is bootstrapped):
#   docker compose up -d
#
# Certificate renewal (add to host crontab):
#   0 3 * * * cd /path/to/ctfd && bash renew-certs.sh >> /var/log/certbot-renew.log 2>&1

version: '3.8'

services:
  ctfd:
    image: ctfd/ctfd:3.8.5
    restart: always
    user: root
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=mysql+pymysql://ctfd:${MARIADB_PASSWORD}@db/ctfd
      - REDIS_URL=redis://cache:6379
      - WORKERS=4
      - LOG_FOLDER=/var/log/CTFd
      - UPLOAD_FOLDER=/var/uploads
      - REVERSE_PROXY=true
    volumes:
      - .data/CTFd/logs:/var/log/CTFd
      - .data/CTFd/uploads:/var/uploads
    depends_on:
      - db
      - cache
    networks:
      - ctfd-internal
      - ctfd-external

  db:
    image: mariadb:11.4.12
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_USER=ctfd
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_DATABASE=ctfd
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - .data/mysql:/var/lib/mysql
    networks:
      - ctfd-internal
    command:
      - mariadbd
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --wait_timeout=28800
      - --log-warnings=0

  cache:
    image: redis:8.6.4-alpine
    restart: always
    volumes:
      - .data/redis:/data
    networks:
      - ctfd-internal

  nginx:
    image: nginx:1.28.3-alpine
    restart: always
    environment:
      - DOMAIN=${DOMAIN}
      - DOMAIN_ALT=${DOMAIN_ALT:-}
      - NGINX_ENVSUBST_TEMPLATE_VARS=$${DOMAIN} $${DOMAIN_ALT}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - .data/letsencrypt:/etc/letsencrypt:ro
      - .data/certbot-webroot:/var/www/certbot:ro
    depends_on:
      - ctfd
    networks:
      - ctfd-external

  # Not started by `docker compose up -d` — used only via `docker compose run --rm certbot`
  # in certbot-init.sh and renew-certs.sh.
  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - .data/letsencrypt:/etc/letsencrypt
      - .data/certbot-webroot:/var/www/certbot

networks:
  ctfd-internal:
    internal: true
  ctfd-external:
